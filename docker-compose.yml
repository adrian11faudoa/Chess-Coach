version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      STOCKFISH_PATH: /usr/games/stockfish
      DB_PATH: /data/chesscoach.db
      HOST: 0.0.0.0
      PORT: "8000"
      WORKERS: "1"
    volumes:
      - chess_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  chess_data:
    driver: local
